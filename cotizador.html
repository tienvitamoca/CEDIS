<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotizador — CEDIS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .item-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.5rem;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .total-bar {
      position: sticky;
      bottom: 70px;
      background: var(--primary);
      color: white;
      padding: 1rem;
      border-radius: var(--radius);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="index.html">←</a>
    <h1>🧾 Cotizador</h1>
    <button onclick="limpiarTodo()"
      style="background:rgba(255,255,255,0.2);color:white;border:none;padding:0.3rem 0.6rem;border-radius:6px;font-size:0.8rem;cursor:pointer">Limpiar</button>
  </nav>

  <div class="container has-bottom-nav">

    <div class="card">
      <div class="card-title">Agregar Producto</div>
      <div style="display:flex; gap:0.5rem; margin-bottom:0.75rem">
        <div class="search-wrap" style="flex:1; margin:0">
          <span class="icon">🔍</span>
          <input type="text" id="busqueda" placeholder="Nombre o código..." oninput="buscarProducto()">
        </div>
        <button class="btn" onclick="encenderEscanner()"
          style="background:var(--primary); color:white; padding:0 1rem; border-radius:8px">
          📷
        </button>
      </div>

      <div id="scanner-container" style="display:none; margin-bottom:1rem;">
        <div id="reader" style="width:100%; border-radius:12px; overflow:hidden;"></div>
        <button class="btn btn-outline" onclick="apagarEscanner()" style="width:100%; margin-top:0.5rem">
          Cancelar Escaneo
        </button>
      </div>
      <div id="sugerencias" style="display:none; border:1.5px solid var(--border); border-radius:8px; overflow:hidden;">
      </div>

      <div id="agregar-form" style="display:none; margin-top:0.75rem">
        <div
          style="background:var(--bg); border-radius:8px; padding:0.75rem; margin-bottom:0.75rem; border-left:4px solid var(--primary)">
          <div style="font-weight:700; font-size:1.1rem" id="form-nombre"></div>
          <div style="font-size:0.85rem; color:var(--text-muted)" id="form-info"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem">
          <div class="field">
            <label>Bolsas</label>
            <input type="number" id="form-cantidad" min="1" value="1">
          </div>
          <div class="field">
            <label>Precio Sugerido ($)</label>
            <input type="number" step="0.01" id="form-precio" style="font-weight:700">
          </div>
        </div>
        <div style="display:flex; gap:0.5rem; margin-top:0.75rem">
          <button class="btn btn-outline" style="flex:1" onclick="cancelarAgregar()">Cancelar</button>
          <button class="btn btn-primary" style="flex:1" onclick="agregarAlPedido()">+ Agregar al Pedido</button>
        </div>
      </div>
    </div>

    <div id="pedido-container" style="display:none">
      <div class="card" id="lista-pedido"></div>
      <div class="total-bar">
        <div>
          <div style="font-size:0.78rem;opacity:0.85">Total del pedido</div>
          <div style="font-size:1.5rem;font-weight:700" id="total-monto">$0.00</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:0.78rem;opacity:0.85" id="total-items">0 bolsas</div>
          <button onclick="imprimirPedido()"
            style="background:white;color:var(--primary);border:none;padding:0.4rem 0.8rem;border-radius:6px;font-weight:700;cursor:pointer;margin-top:0.3rem;font-size:0.85rem">
            🖨️ Imprimir
          </button>
        </div>
      </div>
    </div>

    <div id="empty-pedido" class="empty">
      <div class="icon">🧾</div>
      <p>Agrega productos para comenzar el pedido</p>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="index.html"><span class="icon">🏠</span> Inicio</a>
    <a href="catalogo.html"><span class="icon">📋</span> Catálogo</a>
    <!-- <a href="target.html"><span class="icon">🎯</span> Target</a> -->
    <!-- <a href="tradicional.html"><span class="icon">📦</span> Tradicional</a> -->
    <a href="etiquetas.html"><span class="icon">🏷️</span> Etiquetas</a>
    <a href="calculadora.html"><span class="icon">🧮</span> calculadora</a>
  </nav>

  <script src="supabase.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let html5QrCode = null;
    let estaProcesando = false; // Bloqueo para evitar ciclos
    let scannerTimer = null;    // Temporizador de inactividad

    let pedido = [];
    let productoTemp = null;
    let timer = null;

    async function buscarProducto() {
      const q = document.getElementById('busqueda').value.trim();
      clearTimeout(timer);
      if (q.length < 2) { document.getElementById('sugerencias').style.display = 'none'; return; }
      timer = setTimeout(async () => {
        try {
          const num = parseInt(q);
          let params = 'select=*,tipos_producto(nombre)&limit=6&order=nombre.asc';
          params += !isNaN(num) ? `&codigo=eq.${num}` : `&nombre=ilike.*${q}*`;
          mostrarSugerencias(await dbGet('productos', params));
        } catch (e) { console.error(e); }
      }, 300);
    }

    function mostrarSugerencias(lista) {
      const cont = document.getElementById('sugerencias');
      if (!lista.length) { cont.style.display = 'none'; return; }
      cont.innerHTML = lista.map(p => `
        <div onclick="seleccionar(${p.id})"
          style="padding:0.75rem 1rem;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center"
          onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='white'">
          <div>
            <div style="font-weight:600">${p.nombre}</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">${p.tipos_producto?.nombre || ''}</div>
          </div>
          <span class="badge badge-blue">${p.codigo}</span>
        </div>`).join('');
      cont.style.display = 'block';
    }

    async function seleccionar(id) {
      const data = await dbGet('productos', `select=*,tipos_producto(nombre, margen_cliente)&id=eq.${id}`);
      productoTemp = data[0];

      document.getElementById('sugerencias').style.display = 'none';
      document.getElementById('form-nombre').textContent = productoTemp.nombre;
      document.getElementById('form-info').textContent = `Código: ${productoTemp.codigo}`;

      // Por defecto sugerimos el precio de $10 (BB90)
      const mc = productoTemp.tipos_producto?.margen_cliente || 0.22;
      document.getElementById('form-precio').value = redondear(10 / (1 + mc));

      document.getElementById('agregar-form').style.display = 'block';
    }

    function cancelarAgregar() {
      productoTemp = null;
      document.getElementById('agregar-form').style.display = 'none';
    }

    function agregarAlPedido() {
      if (!productoTemp) return;
      const cantidad = parseInt(document.getElementById('form-cantidad').value);
      const precio = parseFloat(document.getElementById('form-precio').value);
      if (!cantidad || cantidad < 1) { alert('Cantidad inválida'); return; }
      if (!precio || precio <= 0) { alert('Precio inválido'); return; }

      const existe = pedido.find(i => i.producto.id === productoTemp.id && i.precio === precio);
      if (existe) {
        existe.cantidad += cantidad;
      } else {
        pedido.push({ producto: productoTemp, cantidad, precio });
      }
      cancelarAgregar();
      renderPedido();
    }

    function eliminarItem(idx) {
      pedido.splice(idx, 1);
      renderPedido();
    }

    function renderPedido() {
      if (!pedido.length) {
        document.getElementById('pedido-container').style.display = 'none';
        document.getElementById('empty-pedido').style.display = 'block';
        return;
      }
      document.getElementById('pedido-container').style.display = 'block';
      document.getElementById('empty-pedido').style.display = 'none';

      const total = pedido.reduce((s, i) => s + i.precio * i.cantidad, 0);
      const totalBolsas = pedido.reduce((s, i) => s + i.cantidad, 0);

      document.getElementById('total-monto').textContent = formatPeso(total);
      document.getElementById('total-items').textContent = `${totalBolsas} bolsa${totalBolsas !== 1 ? 's' : ''}`;

      document.getElementById('lista-pedido').innerHTML = `
        <div class="card-title">${pedido.length} producto${pedido.length !== 1 ? 's' : ''}</div>
        ${pedido.map((item, idx) => `
          <div class="item-row">
            <div>
              <div style="font-weight:600;font-size:0.9rem">${item.producto.nombre}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">
                ${item.cantidad} × ${formatPeso(item.precio)}
              </div>
            </div>
            <div style="font-weight:700;color:var(--primary);white-space:nowrap">${formatPeso(item.precio * item.cantidad)}</div>
            <button onclick="eliminarItem(${idx})"
              style="background:none;border:none;color:#dc2626;font-size:1.1rem;cursor:pointer">✕</button>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding-top:0.75rem;font-weight:700">
          <span>TOTAL</span><span>${formatPeso(total)}</span>
        </div>
      `;
    }

    function limpiarTodo() {
      if (!pedido.length) return;
      if (!confirm('¿Limpiar todo el pedido?')) return;
      pedido = [];
      renderPedido();
    }





    async function encenderEscanner() {
      estaProcesando = false; // Reset de seguridad
      document.getElementById('scanner-container').style.display = 'block';
      html5QrCode = new Html5Qrcode("reader");

      const config = { fps: 10, qrbox: { width: 250, height: 150 }, aspectRatio: 1.0 };

      try {
        await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
          procesarCodigoEscaneado(text);
        });

        // AUTO-APAGADO TRAS 30 SEGUNDOS DE INACTIVIDAD
        clearTimeout(scannerTimer);
        scannerTimer = setTimeout(() => {
          if (html5QrCode) {
            apagarEscanner();
            alert("Escáner apagado por inactividad.");
          }
        }, 30000);

      } catch (err) {
        console.error("No se pudo iniciar la cámara", err);
      }
    }

    async function apagarEscanner() {
      clearTimeout(scannerTimer);
      if (html5QrCode) {
        try {
          // Intentamos detenerlo de forma segura
          await html5QrCode.stop();
          html5QrCode = null;
          // Limpieza manual del DOM para evitar el error 'removeChild'
          const reader = document.getElementById('reader');
          if (reader) reader.innerHTML = "";
        } catch (e) {
          console.warn("El escáner ya estaba detenido o falló al limpiar.");
        }
      }
      document.getElementById('scanner-container').style.display = 'none';
    }

    async function apagarEscanner() {
      if (html5QrCode) {
        await html5QrCode.stop();
        html5QrCode = null;
      }
      document.getElementById('scanner-container').style.display = 'none';
    }

    // Modificamos esta función para que limpie el escáner al terminar
    // ─── FUNCIÓN PROFESIONAL DE PROCESAMIENTO DE ESCANEO ──────────
    // ─── FUNCIÓN COMPLETA Y CORREGIDA PARA COTIZADOR.HTML ──────────
    // ─── PROCESAMIENTO AUTOMÁTICO BASADO EN COSTOS ──────────
    async function procesarCodigoEscaneado(codigoFull) {
      // SI YA ESTÁ PROCESANDO, IGNORA CUALQUIER OTRA LECTURA
      if (estaProcesando) return;
      estaProcesando = true;

      const limpio = codigoFull.replace(/\*/g, '').trim();
      const codProdStr = limpio.substring(0, 6);
      const codBB = limpio.substring(6, 8);
      const codProdNum = parseInt(codProdStr);

      try {
        if (navigator.vibrate) navigator.vibrate(100);

        // APAGADO INMEDIATO Y SEGURO DEL ESCÁNER
        await apagarEscanner();

        const dataP = await dbGet('productos', `select=*,tipos_producto(*)&codigo=eq.${codProdNum}`);
        if (!dataP || !dataP.length) {
          alert(`❌ PRODUCTO NO ENCONTRADO: [${codProdNum}]`);
          estaProcesando = false; // Liberamos el candado
          return;
        }
        const p = dataP[0];

        let precioVentaTuyo = 0;
        let precioTiendaSugerido = 0;
        let infoPresentacion = "";

        if (codBB === "90") {
          precioTiendaSugerido = 10;
          const mCliente = parseFloat(p.tipos_producto?.margen_cliente) || 0.30;
          precioVentaTuyo = precioTiendaSugerido / (1 + mCliente);
          infoPresentacion = "Presentación Fija: $10.00";
        } else {
          const dataBB = await dbGet('presentaciones', `select=*&codigo_bb=eq.${codBB}`);
          if (!dataBB || !dataBB.length) {
            alert(`❌ ERROR: No existe la presentación [${codBB}].`);
            estaProcesando = false;
            return;
          }
          const bb = dataBB[0];
          const gramosBolsa = parseFloat(bb.gramos) || 0;

          const mTuyo = parseFloat(p.margen_tuyo) || 0.12;
          const mCliente = parseFloat(p.tipos_producto?.margen_cliente) || 0.22;
          const res = calcularModoTradicional(p, gramosBolsa, mTuyo, mCliente);

          precioVentaTuyo = res.precio_venta;
          precioTiendaSugerido = res.precio_tienda;
          infoPresentacion = `${bb.nombre} (${gramosBolsa}g)`;
        }

        productoTemp = p;
        document.getElementById('form-nombre').textContent = p.nombre;
        document.getElementById('form-info').textContent = `${infoPresentacion} | Sugerido: $${precioTiendaSugerido.toFixed(2)}`;
        document.getElementById('form-cantidad').value = 1;
        document.getElementById('form-precio').value = precioVentaTuyo.toFixed(2);
        document.getElementById('agregar-form').style.display = 'block';

      } catch (e) {
        // Captura el error 'removeChild' o 'undefined' sin ciclarse
        console.error("Error de escaneo:", e);
      } finally {
        // IMPORTANTE: Solo liberamos el candado después de que todo terminó
        estaProcesando = false;
      }
    }

    // ACTUALIZACIÓN EN cotizador.html
    // REEMPLAZO DEFINITIVO EN cotizador.html
async function imprimirPedido() {
    if (pedido.length === 0) return alert("El pedido está vacío.");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: [80, 150] }); // Formato Ticket 80mm
    const fecha = new Date().toLocaleString();
    const total = pedido.reduce((s, i) => s + i.precio * i.cantidad, 0);

    // --- CARGA DE LOGOTIPO (Temporal) ---
    // Asegúrate de tener 'logo-cedis.png' en la misma carpeta
    const imgData = "logo-cedis.png"; 

    try {
        // Añadir Logotipo (Imagen, x, y, ancho, alto)
        doc.addImage(imgData, 'PNG', 25, 5, 30, 15); // Centrado aprox.
    } catch (e) {
        console.warn("No se pudo cargar el logotipo. Se imprimirá sin él.");
    }

    // --- DISEÑO DEL PDF ---
    doc.setFontSize(14);
    doc.setFont("helvetica", "bold");
    doc.text("CEDIS MORELIA", 40, 25, { align: "center" }); // Bajamos el texto por el logo
    
    doc.setFontSize(9);
    doc.setFont("helvetica", "normal");
    doc.text(`Fecha: ${fecha}`, 10, 32);
    doc.text("------------------------------------------", 10, 36);

    let y = 42;
    pedido.forEach((item) => {
        doc.setFont("helvetica", "bold");
        doc.text(`${item.producto.nombre}`, 10, y);
        doc.setFont("helvetica", "normal");
        y += 5;
        const subtotal = item.precio * item.cantidad;
        doc.text(`${item.cantidad} pzas x $${item.precio.toFixed(2)}`, 10, y);
        doc.text(`$${subtotal.toFixed(2)}`, 70, y, { align: "right" });
        y += 7;
        
        // Si el ticket es muy largo, añadir página y logo de nuevo
        if (y > 135) { 
            doc.addPage(); 
            try { doc.addImage(imgData, 'PNG', 25, 5, 30, 15); } catch(e){}
            doc.text("CEDIS MORELIA", 40, 25, { align: "center" });
            y = 35; 
        }
    });

    doc.text("------------------------------------------", 10, y);
    y += 8;
    doc.setFontSize(12);
    doc.setFont("helvetica", "bold");
    doc.text(`TOTAL: $${total.toFixed(2)}`, 70, y, { align: "right" });

    doc.setFontSize(9);
    doc.setFont("helvetica", "normal");
    y += 8;
    doc.text("¡Gracias por su compra!", 40, y, { align: "center" });

    // --- GENERACIÓN Y ENVÍO ---
    const pdfBlob = doc.output('blob');
    const file = new File([pdfBlob], `Pedido_${Date.now()}.pdf`, { type: 'application/pdf' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
            await navigator.share({
                files: [file],
                title: 'Pedido CEDIS Morelia',
                text: `Hola, adjunto la nota de venta por $${total.toFixed(2)}.`
            });
        } catch (err) {
            console.error("Error al compartir:", err);
            doc.save(`Pedido_${Date.now()}.pdf`);
        }
    } else {
        alert("Tu navegador no soporta envío directo de archivos. Se descargará el PDF.");
        doc.save(`Pedido_${Date.now()}.pdf`);
    }
}

    renderPedido();
  </script>
</body>

</html>
