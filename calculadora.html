<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora — CEDIS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            background: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
        }

        .res-item {
            display: flex;
            flex-direction: column;
        }

        .res-item .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 2px;
        }

        .res-item .value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        /* Colores de rentabilidad */
        .value.success {
            color: var(--success);
        }

        .value.warning {
            color: var(--warning);
        }

        .value.danger {
            color: var(--danger);
        }
    </style>

</head>

<body>
    <nav class="navbar">
        <a href="index.html">←</a>
        <h1>⚖️ Calculadora Maestra</h1>
        <span></span>
    </nav>

    <div class="container has-bottom-nav">
        <div class="card">
            <div class="card-title">Seleccionar Producto</div>
            <div class="search-wrap">
                <span class="icon">🔍</span>
                <input type="text" id="busqueda" placeholder="Buscar por nombre o código..." oninput="buscarProducto()"
                    autocomplete="off">
            </div>
            <div id="sugerencias"
                style="display:none; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; margin-top:0.25rem; background:white;">
            </div>

            <div id="prod-seleccionado" style="display:none; margin-top:0.75rem">
                <div
                    style="display:flex; align-items:center; justify-content:space-between; background:var(--bg); border-radius:8px; padding:0.75rem">
                    <div>
                        <div id="prod-nombre-sel" style="font-weight:700; color:var(--primary)"></div>
                        <div id="prod-codigo-sel" style="font-size:0.75rem; color:var(--text-muted)"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" id="panel-calculos" style="display:none">
            <div class="card-title">Parámetros de Cálculo</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem">
                <div class="field">
                    <label>Precio Tienda ($)</label>
                    <input type="number" id="in-precio" step="0.5" oninput="dispararCalculo('precio')"
                        placeholder="Ej: 10">
                </div>
                <div class="field">
                    <label>Gramos a Empacar</label>
                    <input type="number" id="in-gramos" step="1" oninput="dispararCalculo('gramos')"
                        placeholder="Ej: 50">
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-top:0.5rem">
                <div class="field">
                    <label>M. Tuyo (Propio)</label>
                    <input type="number" step="0.01" id="m-tuyo" oninput="dispararCalculo('margen')">
                </div>
                <div class="field">
                    <label>M. Cliente (Tienda)</label>
                    <input type="number" step="0.01" id="m-clie" oninput="dispararCalculo('margen')">
                </div>
            </div>
        </div>

        <div id="resultados" class="card" style="display:none">
            <div class="card-title">Análisis de Rentabilidad</div>

            <div class="result-grid">
                <div class="res-item">
                    <span class="label">Gramos</span>
                    <span id="r-gramos" class="value">0g</span>
                </div>

                <div class="res-item">
                    <span class="label">Precio Tienda</span>
                    <span id="r-precio-tienda" class="value">$0.00</span>
                </div>

                <div class="res-item">
                    <span class="label">Costo MP</span>
                    <span id="r-costo-mp" class="value">$0.00</span>
                </div>

                <div class="res-item">
                    <span class="label">Insumos</span>
                    <span id="r-insumos" class="value">$0.00</span>
                </div>

                <div class="res-item"
                    style="grid-column: span 2; border-top: 1px solid var(--border); padding-top: 0.5rem; margin-top: 0.25rem;">
                    <span class="label">Costo Total Pack</span>
                    <span id="r-costo-total" class="value">$0.00</span>
                </div>

                <div class="res-item">
                    <span class="label">Tu Precio Venta</span>
                    <span id="r-precio-venta" class="value">$0.00</span>
                </div>

                <div class="res-item">
                    <span class="label">Utilidad</span>
                    <span id="r-utilidad" class="value">$0.00</span>
                </div>
            </div>
        </div>

        <div id="card-codigo" class="card" style="display:none; border-left: 4px solid var(--primary);">
            <div style="padding:1rem">
                <div class="label"
                    style="font-size:0.65rem; color:var(--text-muted); font-weight:700; text-transform:uppercase">
                    Presentación sugerida</div>
                <div id="r-presentacion-nombre" style="font-weight:700; font-size:0.95rem; margin:0.25rem 0"></div>
                <div id="r-codigo-barras"
                    style="font-family:monospace; font-size:1.1rem; letter-spacing:2px; color:var(--primary); font-weight:700">
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html"><span class="icon">🏠</span> Inicio</a>
        <a href="catalogo.html"><span class="icon">📋</span> Catálogo</a>
        <a href="calculadora.html" class="active"><span class="icon">⚖️</span> Calculadora</a>
    </nav>

    <script src="supabase.js"></script>
    <script>
        let productoActual = null;
        let presentaciones = [];
        let ultimaEntrada = 'precio';

        async function init() {
            presentaciones = await dbGet('presentaciones', 'order=codigo_bb.asc');
        }

        async function buscarProducto() {
            const q = document.getElementById('busqueda').value;
            if (q.length < 2) { document.getElementById('sugerencias').style.display = 'none'; return; }
            const data = await dbGet('productos', `select=*,tipos_producto(*)&nombre=ilike.*${q}*&limit=5`);
            const sug = document.getElementById('sugerencias');
            sug.innerHTML = data.map(p => `
        <div style="padding:0.75rem; border-bottom:1px solid var(--border); cursor:pointer" onclick='seleccionar(${JSON.stringify(p)})'>
          <div style="font-weight:600; font-size:0.9rem">${p.nombre}</div>
          <div style="font-size:0.7rem; color:var(--text-muted)">Código: ${p.codigo}</div>
        </div>`).join('');
            sug.style.display = 'block';
        }

        function seleccionar(p) {
            productoActual = p;
            document.getElementById('sugerencias').style.display = 'none';
            document.getElementById('prod-seleccionado').style.display = 'block';
            document.getElementById('panel-calculos').style.display = 'block';
            document.getElementById('resultados').style.display = 'block';
            document.getElementById('prod-nombre-sel').textContent = p.nombre;
            document.getElementById('prod-codigo-sel').textContent = `Categoría: ${p.tipos_producto?.nombre || 'General'} | Código: ${p.codigo}`;

            // CARGA AUTOMÁTICA DESDE DB (Cambio que pediste)
            if (p.tipos_producto) {
                document.getElementById('m-tuyo').value = p.tipos_producto.margen_tuyo || 0.12;
                document.getElementById('m-clie').value = p.tipos_producto.margen_cliente || 0.22;
            }

            document.getElementById('in-precio').value = 10;
            dispararCalculo('precio');
        }

        function dispararCalculo(origen) {
            if (!productoActual) return;
            if (origen !== 'margen') ultimaEntrada = origen;

            const precio = parseFloat(document.getElementById('in-precio').value) || 0;
            const gramos = parseFloat(document.getElementById('in-gramos').value) || 0;
            const mt = parseFloat(document.getElementById('m-tuyo').value) || 0;
            const mc = parseFloat(document.getElementById('m-clie').value) || 0;

            let res;
            if (ultimaEntrada === 'precio') {
                res = calcularTargetCosting(productoActual, precio, mc, mt);
                if (res) document.getElementById('in-gramos').value = res.gramos;
            } else {
                res = calcularModoTradicional(productoActual, gramos, mt, mc);
                if (res) document.getElementById('in-precio').value = res.precio_tienda;
            }

            if (res) mostrarResultados(res);
        }

        function mostrarResultados(res) {
            const g = parseFloat(document.getElementById('in-gramos').value) || 0;
            const pTienda = parseFloat(document.getElementById('in-precio').value) || 0;

            document.getElementById('r-gramos').textContent = `${g}g`;
            document.getElementById('r-costo-mp').textContent = formatPeso(res.costo_mp);
            document.getElementById('r-insumos').textContent = formatPeso(res.insumos || (res.costo_total - res.costo_mp));
            document.getElementById('r-costo-total').textContent = formatPeso(res.costo_total || (res.costo_mp + res.insumos));
            document.getElementById('r-precio-venta').textContent = formatPeso(res.precio_venta);

            // Utilidad con Alerta (Estilo Target Costing)
            const elUtilidad = document.getElementById('r-utilidad');
            const estado = obtenerEstadoRentabilidad(res.utilidad, res.precio_venta);
            elUtilidad.textContent = formatPeso(res.utilidad);
            elUtilidad.className = 'value ' + estado.clase;
            if (estado.alerta) {
                elUtilidad.innerHTML += ` <small style="display:block; font-size:0.6rem">⚠️ Ganancia crítica: ${estado.porcentaje}%</small>`;
            }

            // Código de Barras dinámico
            const bb = bbPorPrecio(presentaciones, pTienda) || bbPorGramos(presentaciones, g);
            if (bb) {
                document.getElementById('card-codigo').style.display = 'block';
                document.getElementById('r-presentacion-nombre').textContent = `${bb.nombre} · BB-${bb.codigo_bb}`;
                document.getElementById('r-codigo-barras').textContent = generarCodigoBarras(productoActual, bb.codigo_bb).num;
            } else {
                document.getElementById('card-codigo').style.display = 'none';
            }
        }

        init();
    </script>
</body>

</html>
