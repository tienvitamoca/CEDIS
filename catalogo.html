<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — CEDIS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar">
    <a href="index.html">←</a>
    <h1>📋 Catálogo</h1>
    <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:white;border:none" onclick="abrirModal()">+
      Nuevo</button>
  </nav>

  <div class="container has-bottom-nav">

    <div class="card" style="padding:1rem">
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="busqueda" placeholder="Buscar por nombre o código..." oninput="buscar()">
      </div>
      <select id="filtro-tipo" onchange="buscar()" style="margin-top:0.5rem">
        <option value="">Todas las categorías</option>
      </select>
    </div>

    <div class="card" id="lista-container">
      <div class="spinner"></div>
    </div>

  </div>

  <!-- Modal producto -->
  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;overflow-y:auto">
    <div
      style="background:white;margin:1rem auto;border-radius:var(--radius);padding:1.25rem;max-width:500px;margin-top:2rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h3 id="modal-titulo">Producto</h3>
        <button onclick="cerrarModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer">✕</button>
      </div>

      <input type="hidden" id="prod-id">
      <input type="hidden" id="prod-es-nuevo">

      <div class="field">
        <label>Nombre</label>
        <input type="text" id="prod-nombre" placeholder="Ej: Frijol canario">
      </div>

      <div class="field">
        <label>Categoría</label>
        <select id="prod-tipo" onchange="sugerirCodigo()" required>
        </select>
      </div>

      <div class="field">
        <label>Código generado automáticamente</label>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <input type="text" id="prod-codigo" readonly
            style="font-family:monospace;font-size:1.1rem;font-weight:700;letter-spacing:0.1em;flex:1;background:var(--bg)">
          <span id="codigo-estado" style="font-size:1rem"></span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
        <div class="field">
          <label>Costo por Kg ($)</label>
          <input type="number" step="0.01" id="prod-costo-kg" placeholder="0.00">
        </div>
        <div class="field">
          <label>Merma (%)</label>
          <input type="number" step="0.001" id="prod-merma" placeholder="0.02">
        </div>
        <div class="field">
          <label>Costo Bolsa ($)</label>
          <input type="number" step="0.01" id="prod-bolsa" placeholder="0.00">
        </div>
        <div class="field">
          <label>Costo Producción ($)</label>
          <input type="number" step="0.01" id="prod-produccion" placeholder="0.00">
        </div>
      </div>

      <div id="modal-error" class="alert alert-error" style="display:none"></div>

      
      <div style="display:flex;gap:0.75rem;margin-top:0.75rem">
        <button class="btn btn-outline" style="flex:1" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" style="flex:1" onclick="guardarProducto()">Guardar</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"><span class="icon">🏠</span> Inicio</a>
    <!-- <a href="catalogo.html" class="active"><span class="icon">📋</span> Catálogo</a> -->
    <!-- <a href="target.html"><span class="icon">🎯</span> Target</a>
    <a href="tradicional.html"><span class="icon">📦</span> Tradicional</a> -->
    <!-- <a href="cotizador.html"><span class="icon">🧾</span> Cotizador</a> -->
    <a href="etiquetas.html"><span class="icon">🏷️</span> Etiquetas</a>
    <a href="CEDIS.html"><span class="icon">🧮</span> CEDIS</a>
  </nav>

  <script src="supabase.js"></script>
  <script>
    let productos = [];
    let tipos = [];

    async function init() {
      tipos = await getTipos();

      const selFiltro = document.getElementById('filtro-tipo');
      const selModal = document.getElementById('prod-tipo');

      tipos.forEach(t => {
        selFiltro.innerHTML += `<option value="${t.id}">${t.nombre}</option>`;
        selModal.innerHTML += `<option value="${t.id}">${t.nombre}</option>`;
      });

      await buscar();
    }

    async function buscar() {
      const q = document.getElementById('busqueda').value.trim();
      const tipo = document.getElementById('filtro-tipo').value;
      document.getElementById('lista-container').innerHTML = '<div class="spinner"></div>';

      try {
        let params = 'select=*,tipos_producto(nombre)&order=codigo.asc';
        if (q) {
          const num = parseInt(q);
          params += !isNaN(num) ? `&codigo=eq.${num}` : `&nombre=ilike.*${q}*`;
        }
        if (tipo) params += `&tipo_id=eq.${tipo}`;
        productos = await dbGet('productos', params);
        renderLista();
      } catch (e) {
        document.getElementById('lista-container').innerHTML =
          `<div class="alert alert-error">${e.message}</div>`;
      }
    }

    function renderLista() {
      const cont = document.getElementById('lista-container');
      if (!productos.length) {
        cont.innerHTML = `<div class="empty"><div class="icon">📭</div><p>Sin resultados</p></div>`;
        return;
      }
      cont.innerHTML = productos.map(p => `
        <div class="list-item" onclick="editarProducto(${p.id})">
          <div>
            <div class="nombre">${p.nombre}</div>
            <div class="sub">
              <span class="badge badge-blue">${p.codigo}</span>
              &nbsp;${p.tipos_producto?.nombre || ''}
              ${p.costo_kg
          ? `&nbsp;·&nbsp;<strong>$${p.costo_kg}/kg</strong>`
          : '&nbsp;·&nbsp;<span style="color:#dc2626">Sin costo</span>'}
            </div>
          </div>
          <span class="arrow">›</span>
        </div>
      `).join('');
    }

    // ── Código automático ──────────────────────────────────────
    // Estructura: tipoId(3 dígitos) + correlativo(3 dígitos)
    // Ej: tipo 260 → códigos 260000, 260001, 260002...
    async function actualizarCodigoAuto() {
      const esNuevo = document.getElementById('prod-es-nuevo').value === '1';
      if (!esNuevo) return;

      const tipoId = parseInt(document.getElementById('prod-tipo').value);
      if (!tipoId) return;

      document.getElementById('codigo-estado').textContent = '⏳';
      document.getElementById('prod-codigo').value = '';

      try {
        const prefijo = tipoId * 1000;       // 260000
        const maximo = tipoId * 1000 + 999; // 260999

        const data = await dbGet('productos',
          `select=codigo&codigo=gte.${prefijo}&codigo=lte.${maximo}&order=codigo.desc&limit=1`
        );

        let siguiente;
        if (data.length === 0) {
          siguiente = prefijo;
        } else {
          siguiente = data[0].codigo + 1;
        }

        if (siguiente > maximo) {
          document.getElementById('prod-codigo').value = '---';
          document.getElementById('codigo-estado').textContent = '⚠️ Categoría llena (1000 productos)';
          return;
        }

        document.getElementById('prod-codigo').value = siguiente;
        document.getElementById('codigo-estado').textContent = '✅';
      } catch (e) {
        document.getElementById('codigo-estado').textContent = '❌';
        console.error(e);
      }
    }

    // ── Modal ──────────────────────────────────────────────────
    async function abrirModal(prod = null) {
      
      const esNuevo = !prod;
      document.getElementById('modal-titulo').textContent = esNuevo ? 'Nuevo Producto' : 'Editar Producto';
      document.getElementById('prod-id').value = prod?.id || '';
      document.getElementById('prod-es-nuevo').value = esNuevo ? '1' : '0';
      document.getElementById('prod-nombre').value = prod?.nombre || '';
      document.getElementById('prod-tipo').value = prod?.tipo_id || tipos[0]?.id || '';
      document.getElementById('prod-codigo').value = prod?.codigo || '';
      document.getElementById('prod-costo-kg').value = prod?.costo_kg || '';
      document.getElementById('prod-merma').value = prod?.merma_pct ?? 0.02;
      document.getElementById('prod-bolsa').value = prod?.costo_bolsa || '';
      document.getElementById('prod-produccion').value = prod?.costo_produccion || '';
      document.getElementById('modal-error').style.display = 'none';
      document.getElementById('codigo-estado').textContent = esNuevo ? '' : '🔒';

      if (esNuevo) await actualizarCodigoAuto();

      document.getElementById('modal').style.display = 'block';
    }

    function cerrarModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function editarProducto(id) {
      const prod = productos.find(p => p.id === id);
      if (prod) await abrirModal(prod);
    }

    async function guardarProducto() {
      const id = document.getElementById('prod-id').value;
      const nombre = document.getElementById('prod-nombre').value.trim();
      const codigo = parseInt(document.getElementById('prod-codigo').value);

      if (!nombre) { mostrarError('El nombre es obligatorio'); return; }
      if (!codigo || isNaN(codigo)) { mostrarError('Código inválido, selecciona una categoría'); return; }

      const data = {
        nombre,
        codigo,
        tipo_id: parseInt(document.getElementById('prod-tipo').value),
        costo_kg: parseFloat(document.getElementById('prod-costo-kg').value) || null,
        merma_pct: parseFloat(document.getElementById('prod-merma').value) || 0.02,
        costo_bolsa: parseFloat(document.getElementById('prod-bolsa').value) || null,
        costo_produccion: parseFloat(document.getElementById('prod-produccion').value) || null,
      };

      try {
        if (id) {
          console.log('Guardando tipo:', id, data);
          await dbPatch('productos', id, data);
        } else {
          console.log('Guardando tipo:', data);
          await dbPost('productos', data);
        }
        cerrarModal();
        await buscar();
      } catch (e) {
        mostrarError(e.message);
      }
    }

    function mostrarError(msg) {
      const el = document.getElementById('modal-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Agrega esta función a catalogo.html
    function actualizarCodigoPorCategoria() {
      const tipoId = document.getElementById('prod-tipo').value; // Ej: 250
      const inputCodigo = document.getElementById('prod-codigo');

      if (!tipoId) return;

      const prefijoNuevo = String(tipoId).substring(0, 3);
      const codigoActual = String(inputCodigo.value);

      // Si el código actual no empieza con el prefijo de la categoría elegida
      if (!codigoActual.startsWith(prefijoNuevo)) {
        // Tomamos los últimos 3 dígitos del código viejo para mantener la secuencia
        const correlativo = codigoActual.slice(-3);
        inputCodigo.value = prefijoNuevo + correlativo;

        console.log(`Sistema: Código actualizado a ${inputCodigo.value} para coincidir con la categoría.`);
      }
    }
    // REEMPLAZAR en catalogo.html
// REEMPLAZAR COMPLETAMENTE EN catalogo.html
async function sugerirCodigo() {
  const tipoId = document.getElementById('prod-tipo').value;
  const inputCodigo = document.getElementById('prod-codigo');
  const prodId = document.getElementById('prod-id').value;

  if (!tipoId) return;

  const prefijo = String(tipoId).substring(0, 3);
  
  try {
    // CONSULTA REAL: Traemos solo el código más alto de esta categoría desde Supabase
    const data = await dbGet('productos', `select=codigo&tipo_id=eq.${tipoId}&order=codigo.desc&limit=1`);
    
    // Si estamos editando, verificamos si el código actual ya pertenece a la categoría
    if (prodId) {
      const pActual = productos.find(x => x.id == prodId);
      if (pActual && pActual.tipo_id == tipoId) {
        inputCodigo.value = pActual.codigo;
        return;
      }
    }

    if (data && data.length > 0) {
      // Si hay productos, sumamos 1 al más alto
      const ultimoCodigo = parseInt(data[0].codigo);
      inputCodigo.value = ultimoCodigo + 1;
    } else {
      // Si la categoría está vacía, empezamos en 001
      inputCodigo.value = prefijo + "001";
    }
  } catch (e) {
    console.error("Error al sugerir código:", e);
    // Fallback: usar la lista local si la red falla
    const locales = productos.filter(p => p.tipo_id == tipoId);
    if (locales.length > 0) {
      const max = Math.max(...locales.map(p => p.codigo));
      inputCodigo.value = max + 1;
    } else {
      inputCodigo.value = prefijo + "001";
    }
  }
}
    init();
  </script>
</body>

</html>
