<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imprimir Etiquetas — CEDIS</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Barcode+128&family=Libre+Barcode+128+Text&family=Libre+Barcode+39&display=swap"
    rel="stylesheet">
  <style>
    .etiqueta {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 0.1mm solid #ccc;
    overflow: hidden; /* Evita que el código se desborde */
  }

  .barcode-svg {
    max-width: 90%; /* Ajusta el ancho para que no pegue en los bordes */
  }

  .numero-legible {
    font-family: 'Courier New', monospace;
    font-size: 7pt;
    margin-top: 1px;
    letter-spacing: 1px;
  }
    /* Estilo para la vista previa en pantalla */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 5px;
      margin-top: 1rem;
      border: 1px dashed #ccc;
      padding: 10px;
    }

    .mini-etiqueta {
      border: 1px solid #eee;
      text-align: center;
      font-size: 0.6rem;
      padding: 5px;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="index.html">←</a>
    <h1>🏷️ Generador de Etiquetas</h1>
    <span></span>
  </nav>

  <div class="container has-bottom-nav">
    <div class="card">
      <div class="card-title">Configurar Etiquetas</div>

      <div class="field">
        <label>Buscar Producto</label>
        <div class="search-wrap">
          <span class="icon">🔍</span>
          <input type="text" id="busqueda" placeholder="Nombre o código..." oninput="buscarProducto()"
            autocomplete="off">
        </div>
        <div id="sugerencias"
          style="display:none; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; margin-top:0.25rem; background:white; position:relative; z-index:100;">
        </div>
      </div>

      <div id="prod-seleccionado"
        style="display:none; margin-top:1rem; background:var(--bg); padding:0.75rem; border-radius:8px; border-left:4px solid var(--primary);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div id="prod-nombre-sel"
              style="font-weight:700; color:var(--primary); text-transform:uppercase; font-size:0.9rem;"></div>
            <div id="prod-info-sel" style="font-size:0.75rem; color:var(--text-muted);"></div>
          </div>
          <button onclick="limpiarSeleccion()"
            style="background:none; border:none; color:#dc2626; font-size:1.2rem; cursor:pointer; padding:5px;">✕</button>
        </div>
      </div>

      <div id="config-panel" style="display:none; margin-top: 1rem;">
        <div class="card">
          <div class="field">
            <label>Presentación / Precio</label>
            <select id="presentacion-bb" class="input-moderno"></select>
          </div>
          <div class="field">
            <label>Cantidad de etiquetas</label>
            <input type="number" id="cantidad-etiquetas" value="78" min="1" max="100">
          </div>

          <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem;">

            <button class="btn" style="background:#22c55e; color:white;" onclick="abrirVistaPrevia()">
              💬 WhatsApp
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="preview-container" style="display:none">
      <div class="card-title">Vista Previa (Muestra)</div>
      <div class="preview-grid" id="lista-previa"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"><span class="icon">🏠</span> Inicio</a>
    <a href="catalogo.html"><span class="icon">📋</span> Catálogo</a>
    <!-- <a href="etiquetas.html" class="active"><span class="icon">🏷️</span> Etiquetas</a> -->
    <!-- <a href="cotizador.html"><span class="icon">🧾</span> Cotizador</a> -->
    <a href="CEDIS.html"><span class="icon">🧮</span> Caulculadora</a>
  </nav>

  <script src="supabase.js"></script>
  <script>
    let productoActual = null;
    let todasPresentaciones = []; // Cambiar nombre para claridad
    let timer = null;

    async function init() {
      // 1. Obtener todas las presentaciones base
      todasPresentaciones = await getPresentaciones();

      // 2. Filtrar para tener solo UN ejemplar de cada código BB único
      // Esto evita que se repita " Jamaica $8" si hay múltiples registros base.
      const presentacionesUnicas = [];
      const codigosVistos = new Set();

      todasPresentaciones.forEach(p => {
        if (!codigosVistos.has(p.codigo_bb)) {
          codigosVistos.add(p.codigo_bb);
          presentacionesUnicas.push(p);
        }
      });

      // 3. Llenar el select con las únicas
      const sel = document.getElementById('presentacion-bb');
      sel.innerHTML = '<option value="">-- Selecciona --</option>'; // Opción vacía inicial
      presentacionesUnicas.forEach(p => {
        // Mostramos el nombre de la presentación (ej: "Jamaica $8")
        sel.innerHTML += `<option value="${p.codigo_bb}">${p.nombre}</option>`;
      });
    }

    async function buscarProducto() {
      const q = document.getElementById('busqueda').value.trim();
      clearTimeout(timer);
      if (q.length < 2) { document.getElementById('sugerencias').style.display = 'none'; return; }
      timer = setTimeout(async () => {
        const params = `select=*,tipos_producto(nombre)&limit=5&nombre=ilike.*${q}*`;
        mostrarSugerencias(await dbGet('productos', params));
      }, 300);
    }

    function mostrarSugerencias(lista) {
      const cont = document.getElementById('sugerencias');
      cont.innerHTML = lista.map(p => `
        <div onclick="seleccionar(${p.id})" style="padding:10px; cursor:pointer; border-bottom:1px solid #eee;">
          ${p.nombre} <small>(${p.codigo})</small>
        </div>`).join('');
      cont.style.display = 'block';
    }

    // REEMPLAZO Y ADICIÓN EN EL SCRIPT DE etiquetas.html

    // En el script de etiquetas.html
    async function seleccionar(id) {
      const data = await dbGet('productos', `select=*,tipos_producto(nombre)&id=eq.${id}`);
      if (!data.length) return;

      productoActual = data[0];

      // Actualizamos la pestaña visual del producto
      document.getElementById('prod-nombre-sel').textContent = productoActual.nombre;
      document.getElementById('prod-info-sel').textContent = `Código: ${productoActual.codigo}`;

      document.getElementById('sugerencias').style.display = 'none';
      document.getElementById('busqueda').value = '';
      document.getElementById('prod-seleccionado').style.display = 'block';
      document.getElementById('config-panel').style.display = 'block';
      // Ya no llamamos a actualizarVistaPrevia()
    }

    function limpiarSeleccion() {
      productoActual = null;
      document.getElementById('prod-seleccionado').style.display = 'none';
      document.getElementById('config-panel').style.display = 'none';
      document.getElementById('preview-container').style.display = 'none';
      document.getElementById('busqueda').value = '';
      document.getElementById('busqueda').focus(); // Ponemos el foco listo para buscar otro
    }

    function actualizarVistaPrevia() {
      if (!productoActual) return;
      const bb = document.getElementById('presentacion-bb').value;
      const codigoObj = generarCodigoBarras(productoActual, bb);
      const cont = document.getElementById('lista-previa');

      cont.innerHTML = '';
      // Solo mostramos 6 de vista previa para no saturar
      for (let i = 0; i < 6; i++) {
        cont.innerHTML += `
          <div class="mini-etiqueta">
            <strong>${productoActual.nombre}</strong><br>
            ${codigoObj.num}
          </div>`;
      }
    }

    function generarCodigoBarras(producto, codigo_bb) {
      const tipo_str = String(producto.tipo_id);
      const prefix = tipo_str.slice(0, 2);
      const tipo_dig = tipo_str.slice(2);
      const codigo_str = String(producto.codigo);
      const ccc = codigo_str.slice(3).padStart(3, '0');

      const limpioProd = String(producto.codigo).trim();
      const limpioBB = String(codigo_bb).trim();

      const codigoNumerico = `${limpioProd}${limpioBB}`;

      return {
        num: codigoNumerico,
        // El asterisco es el "carácter de inicio y fin" en Code 39
        textoParaFuente: `*${codigoNumerico}*`
      };
    }


async function abrirVistaPrevia() {
    if (!productoActual) return alert("Selecciona un producto primero");
    
    // Crear el modal de vista previa
    const modal = document.createElement('div');
    modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; padding:20px; overflow-y:auto;";
    
    const cantidad = parseInt(document.getElementById('cantidad-etiquetas').value) || 1;
    const bbCode = document.getElementById('presentacion-bb').value;
    const cod = generarCodigoBarras(productoActual, bbCode);
    
    modal.innerHTML = `
        <div style="text-align:center; margin-bottom:20px;">
            <button onclick="this.parentElement.parentElement.remove()" style="padding:10px 20px; background:#ef4444; color:white; border:none; border-radius:5px;">Cerrar</button>
            <button id="btn-enviar" style="padding:10px 20px; background:#22c55e; color:white; border:none; border-radius:5px;">Enviar PDF por WhatsApp</button>
        </div>
        <div id="contenedor-pdf" style="display:grid; grid-template-columns: repeat(4, 30mm); gap:5px; justify-content:center;">
            ${Array(cantidad).fill(0).map(() => `
                <div style="border:1px solid #000; padding:5px; text-align:center; height:20mm; overflow:hidden;">
                    <div style="font-size:7pt; font-weight:bold;">${productoActual.nombre}</div>
                    <svg class="barcode-svg" data-value="${cod.num}" style="width:100%; height:20px;"></svg>
                    <div style="font-size:6pt; font-family:monospace;">${cod.num}</div>
                </div>
            `).join('')}
        </div>
    `;
    document.body.appendChild(modal);

    // Dibujar códigos de barras inmediatamente
    modal.querySelectorAll(".barcode-svg").forEach(s => {
        JsBarcode(s, s.getAttribute("data-value"), { format: "CODE128", width: 2, height: 40, displayValue: false, margin: 0 });
    });

    // Acción de enviar
    document.getElementById('btn-enviar').onclick = async () => {
        const btn = document.getElementById('btn-enviar');
        btn.innerText = "Generando...";
        btn.disabled = true;

        const elemento = document.getElementById('contenedor-pdf');
        const pdfBlob = await html2pdf().from(elemento).set({ margin: 5, filename: 'Etiquetas.pdf' }).output('blob');
        
        const archivo = new File([pdfBlob], "Etiquetas.pdf", { type: 'application/pdf' });
        if (navigator.canShare && navigator.canShare({ files: [archivo] })) {
            await navigator.share({ files: [archivo] });
        } else {
            saveAs(pdfBlob, "Etiquetas.pdf");
        }
        btn.innerText = "Enviar PDF por WhatsApp";
        btn.disabled = false;
    };
}
    
    
    init();
  </script>
</body>

</html>
