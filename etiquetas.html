<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imprimir Etiquetas — CEDIS</title>
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Barcode+128&family=Libre+Barcode+128+Text&family=Libre+Barcode+39&display=swap"
    rel="stylesheet">
  <style>
    /* Estilo para la vista previa en pantalla */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 5px;
      margin-top: 1rem;
      border: 1px dashed #ccc;
      padding: 10px; 
    }

    .mini-etiqueta {
      border: 1px solid #eee;
      text-align: center;
      font-size: 0.6rem;
      padding: 5px;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="index.html">←</a>
    <h1>🏷️ Generador de Etiquetas</h1>
    <span></span>
  </nav>

  <div class="container has-bottom-nav">
    <div class="card">
      <div class="card-title">Configurar Etiquetas</div>

      <div class="field">
        <label>Buscar Producto</label>
        <div class="search-wrap">
          <span class="icon">🔍</span>
          <input type="text" id="busqueda" placeholder="Nombre o código..." oninput="buscarProducto()"
            autocomplete="off">
        </div>
        <div id="sugerencias"
          style="display:none; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; margin-top:0.25rem; background:white; position:relative; z-index:100;">
        </div>
      </div>

      <div id="prod-seleccionado"
        style="display:none; margin-top:1rem; background:var(--bg); padding:0.75rem; border-radius:8px; border-left:4px solid var(--primary);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div id="prod-nombre-sel"
              style="font-weight:700; color:var(--primary); text-transform:uppercase; font-size:0.9rem;"></div>
            <div id="prod-info-sel" style="font-size:0.75rem; color:var(--text-muted);"></div>
          </div>
          <button onclick="limpiarSeleccion()"
            style="background:none; border:none; color:#dc2626; font-size:1.2rem; cursor:pointer; padding:5px;">✕</button>
        </div>
      </div>

      <div id="config-panel" style="display:none; margin-top: 1rem;">
        <div class="card">
          <div class="field">
            <label>Presentación / Precio</label>
            <select id="presentacion-bb" class="input-moderno"></select>
          </div>
          <div class="field">
            <label>Cantidad de etiquetas</label>
            <input type="number" id="cantidad-etiquetas" value="66" min="1" max="100">
          </div>

          <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem;">
            <button class="btn btn-primary" onclick="imprimirPDF()">
              🖨️ Imprimir
            </button>
            <button class="btn" style="background:#22c55e; color:white;" onclick="compartirPDF()">
              💬 WhatsApp
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="preview-container" style="display:none">
      <div class="card-title">Vista Previa (Muestra)</div>
      <div class="preview-grid" id="lista-previa"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"><span class="icon">🏠</span> Inicio</a>
    <a href="catalogo.html"><span class="icon">📋</span> Catálogo</a>
    <!-- <a href="etiquetas.html" class="active"><span class="icon">🏷️</span> Etiquetas</a> -->
    <a href="cotizador.html"><span class="icon">🧾</span> Cotizador</a>
    <a href="calculadora.html"><span class="icon">🧮</span> Caulculadora</a>
  </nav>

  <script src="supabase.js"></script>
  <script>
    let productoActual = null;
    let todasPresentaciones = []; // Cambiar nombre para claridad
    let timer = null;

    async function init() {
      // 1. Obtener todas las presentaciones base
      todasPresentaciones = await getPresentaciones();

      // 2. Filtrar para tener solo UN ejemplar de cada código BB único
      // Esto evita que se repita " Jamaica $8" si hay múltiples registros base.
      const presentacionesUnicas = [];
      const codigosVistos = new Set();

      todasPresentaciones.forEach(p => {
        if (!codigosVistos.has(p.codigo_bb)) {
          codigosVistos.add(p.codigo_bb);
          presentacionesUnicas.push(p);
        }
      });

      // 3. Llenar el select con las únicas
      const sel = document.getElementById('presentacion-bb');
      sel.innerHTML = '<option value="">-- Selecciona --</option>'; // Opción vacía inicial
      presentacionesUnicas.forEach(p => {
        // Mostramos el nombre de la presentación (ej: "Jamaica $8")
        sel.innerHTML += `<option value="${p.codigo_bb}">${p.nombre}</option>`;
      });
    }

    async function buscarProducto() {
      const q = document.getElementById('busqueda').value.trim();
      clearTimeout(timer);
      if (q.length < 2) { document.getElementById('sugerencias').style.display = 'none'; return; }
      timer = setTimeout(async () => {
        const params = `select=*,tipos_producto(nombre)&limit=5&nombre=ilike.*${q}*`;
        mostrarSugerencias(await dbGet('productos', params));
      }, 300);
    }

    function mostrarSugerencias(lista) {
      const cont = document.getElementById('sugerencias');
      cont.innerHTML = lista.map(p => `
        <div onclick="seleccionar(${p.id})" style="padding:10px; cursor:pointer; border-bottom:1px solid #eee;">
          ${p.nombre} <small>(${p.codigo})</small>
        </div>`).join('');
      cont.style.display = 'block';
    }

    // REEMPLAZO Y ADICIÓN EN EL SCRIPT DE etiquetas.html

    // En el script de etiquetas.html
    async function seleccionar(id) {
      const data = await dbGet('productos', `select=*,tipos_producto(nombre)&id=eq.${id}`);
      if (!data.length) return;

      productoActual = data[0];

      // Actualizamos la pestaña visual del producto
      document.getElementById('prod-nombre-sel').textContent = productoActual.nombre;
      document.getElementById('prod-info-sel').textContent = `Código: ${productoActual.codigo}`;

      document.getElementById('sugerencias').style.display = 'none';
      document.getElementById('busqueda').value = '';
      document.getElementById('prod-seleccionado').style.display = 'block';
      document.getElementById('config-panel').style.display = 'block';
      // Ya no llamamos a actualizarVistaPrevia()
    }

    function limpiarSeleccion() {
      productoActual = null;
      document.getElementById('prod-seleccionado').style.display = 'none';
      document.getElementById('config-panel').style.display = 'none';
      document.getElementById('preview-container').style.display = 'none';
      document.getElementById('busqueda').value = '';
      document.getElementById('busqueda').focus(); // Ponemos el foco listo para buscar otro
    }

    function actualizarVistaPrevia() {
      if (!productoActual) return;
      const bb = document.getElementById('presentacion-bb').value;
      const codigoObj = generarCodigoBarras(productoActual, bb);
      const cont = document.getElementById('lista-previa');

      cont.innerHTML = '';
      // Solo mostramos 6 de vista previa para no saturar
      for (let i = 0; i < 6; i++) {
        cont.innerHTML += `
          <div class="mini-etiqueta">
            <strong>${productoActual.nombre}</strong><br>
            ${codigoObj.num}
          </div>`;
      }
    }

    function generarCodigoBarras(producto, codigo_bb) {
      const tipo_str = String(producto.tipo_id);
      const prefix = tipo_str.slice(0, 2);
      const tipo_dig = tipo_str.slice(2);
      const codigo_str = String(producto.codigo);
      const ccc = codigo_str.slice(3).padStart(3, '0');

      const limpioProd = String(producto.codigo).trim();
      const limpioBB = String(codigo_bb).trim();

      const codigoNumerico = `${limpioProd}${limpioBB}`;

      return {
        num: codigoNumerico,
        // El asterisco es el "carácter de inicio y fin" en Code 39
        textoParaFuente: `*${codigoNumerico}*`
      };
    }



function imprimirPDF() {
  if (!productoActual) return;
  const bbCode = document.getElementById('presentacion-bb').value;
  if (!bbCode) { alert('Selecciona una presentación'); return; }

  const pres = todasPresentaciones.find(p => p.codigo_bb === bbCode);
  const codigoObj = generarCodigoBarras(productoActual, bbCode);
  const cantidad = parseInt(document.getElementById('cantidad-etiquetas').value);

  const fechaHoy = new Date().toLocaleDateString('es-MX', {
    day: '2-digit',
    month: '2-digit',
    year: '2-digit'
  });

  const win = window.open('', '_blank');
  win.document.write(`
<html>
<head>
  <title>Etiquetas - ${productoActual.nombre}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">
  <style>
    @page { margin: 0.3cm; size: letter; }

    body { 
      font-family: -apple-system, sans-serif; 
      margin: 0; padding: 0; 
      display: flex; flex-direction: column; align-items: center; 
      background: #f4f4f7; 
    }

    .no-print { 
      padding: 15px; background: white; width: 100%; 
      text-align: center; border-bottom: 1px solid #ddd; margin-bottom: 10px;
      position: sticky; top: 0; z-index: 100;
    }

    /* Vista optimizada para ver en celular */
    .hoja {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(45%, 1fr)); 
      grid-auto-rows: auto;
      gap: 2mm;
      width: 100%;
      background: white;
      padding: 10px;
      box-sizing: border-box;
    }

    .etiqueta {
      border: 0.1mm solid #eee;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
      padding: 1mm 0.5mm; 
      box-sizing: border-box;
      overflow: hidden;
      height: 22mm;
      background: white;
    }

    .nombre { 
      font-size: 7pt; font-weight: bold; text-transform: uppercase; 
      margin-bottom: 0.1mm; width: 100%; white-space: normal; 
      line-height: 0.9; color: #000;
    }

    .presentacion { font-size: 6.5pt; color: #000; font-weight: bold; line-height: 1; margin-bottom: 0.1mm; }
    .fecha-empaque { font-size: 5pt; color: #555; margin-bottom: 1mm; margin-top: 0.1mm; line-height: 1; }

    .barras-visuales {
      font-family: 'Libre Barcode 39', cursive !important;
      font-size: 18pt; 
      display: block;
      text-align: center;
      color: #000 !important;
      letter-spacing: 0 !important;
      word-spacing: 0 !important;
      white-space: nowrap;
      image-rendering: pixelated;
      -webkit-font-smoothing: none;
      transform: scaleY(1.8); /* Reducido un poco para dar aire */
      transform-origin: top;
      height: 25pt; /* Altura fija controlada */
      margin-bottom: 3.5mm;
    } 

    .numero-legible {
      font-family: 'Courier New', monospace;
      font-size: 7pt;
      font-weight: bold;
      margin-top: -10mm; /* Quitamos el margin positivo que empuja */
      text-align: center;
      letter-spacing: 2px;
      line-height: 1;
    }

    @media print { 
      body { background: white; padding: 0; }
      .no-print { display: none; }
      .hoja { 
        display: grid !important;
        grid-template-columns: repeat(6, 31mm) !important;
        grid-auto-rows: 22mm !important;
        padding: 0 !important; gap: 1mm !important;
        width: 190mm !important;
      }
      .etiqueta { 
        border: 0.1mm solid #eee !important; 
        height: 22mm !important; 
      }
      /* Ajuste fino para que el número no se encime al imprimir */
      .numero-legible { 
        margin-top: -1mm !important; 
      }
      .barras-visuales {
        height: 25pt !important;
        margin-bottom: 3mm !important;
      }
    }
  </style>
</head>
<body>
  <div class="no-print">
    <button onclick="window.print()" style="padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;">
      🖨️ IMPRIMIR AHORA
    </button>
  </div>
  
  <div class="hoja">
    ${Array(cantidad).fill(0).map(() => `
      <div class="etiqueta">
        <div class="nombre">${productoActual.nombre}</div>
        <div class="presentacion">${pres.nombre}</div>
        <div class="fecha-empaque">Emp: ${fechaHoy}</div>
        <div class="barras-visuales">${codigoObj.textoParaFuente}</div>
        <div class="numero-legible">${codigoObj.num}</div>
      </div>
    `).join('')}
  </div>
</body>
</html>
`);
  win.document.close();
}



    function compartirPDF() {
      if (!productoActual) return;
      const bbCode = document.getElementById('presentacion-bb').value;
      const cant = document.getElementById('cantidad-etiquetas').value;

      const texto = `*🏷️ ETIQUETAS LISTAS - CEDIS*\n` +
        `• *Producto:* ${productoActual.nombre}\n` +
        `• *Cantidad:* ${cant} etiquetas\n` +
        `• *Fecha:* ${new Date().toLocaleDateString()}\n\n` +
        `_Las etiquetas se han generado correctamente para su impresión._`;

      if (navigator.share) {
        navigator.share({
          title: 'Etiquetas CEDIS',
          text: texto
        }).catch(console.error);
      } else {
        window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
      }
    }


    init();
  </script>
</body>

</html>
